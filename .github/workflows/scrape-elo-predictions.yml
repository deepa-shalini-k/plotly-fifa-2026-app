name: Scrape Elo Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: scrape-elo-predictions
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      PLOTLY_FIFA_PREDICTIONS_SOURCE: local
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Scrape latest Elo data
        run: python scraper.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add elo_snapshots.csv match_results.csv
          if git diff --cached --quiet; then
            echo "No predictions data changes to commit."
            exit 0
          fi
          git commit -m "Update Elo prediction data"
          git push
