name: Run Elo Calculations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: "7-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: run-elo-calculations
  cancel-in-progress: false

jobs:
  calculate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      PLOTLY_FIFA_PREDICTIONS_SOURCE: local
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebuild latest Elo data
        run: python calculate_elo.py

      - name: Rebuild leaderboard snapshot
        run: python build_leaderboards.py

      - name: Commit updated data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add elo_snapshots.csv match_results.csv leaderboards.json
          if git diff --cached --quiet; then
            echo "No data artifact changes to commit."
            exit 0
          fi
          git commit -m "Update Elo and leaderboard data"
          branch="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "${branch}"
          git push origin "HEAD:${branch}"
